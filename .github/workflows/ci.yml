# DeepCoffee CI：push 到 main 或开 PR 时，自动在 GitHub 的一次性云机器上跑后端测试。
# 全程跑在 GitHub Actions 云端，与生产环境（线上 API / Supabase）完全隔离，不碰任何真实数据。
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: 后端测试 (pytest)
    runs-on: ubuntu-latest

    # 测试需要 Postgres：在 CI 机器里临时起一个 postgres:16，跑完即焚（绝不连生产库）。
    # 端口 5433 对齐 deepcoffee-api/tests/conftest.py 的默认测试库连接串。
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: deepcoffee
          POSTGRES_PASSWORD: deepcoffee
          POSTGRES_DB: deepcoffee_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: deepcoffee-api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: deepcoffee-api/pyproject.toml

      - name: 安装依赖
        run: pip install -e ".[dev]"

      # 全新空库由 conftest 的 create_all 一次建全（含 summary 列、user_memories 表），无需跑 migration。
      - name: 跑 pytest
        run: pytest -q
